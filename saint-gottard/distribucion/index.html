<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saint Gottard - Distribuidores | Formulario de Pedidos | Servicomercial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: {
                brand: { 50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d' }
            }}}
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-stone-50 text-gray-800 antialiased pb-36">

    <!-- Hero Header -->
    <header class="brand-header relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br from-green-900/95 via-green-800/90 to-emerald-900/95"></div>
        <div class="relative max-w-5xl mx-auto px-4 py-5 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <img src="https://www.saintgottard.com/media/logo/stores/2/logo-saintgottard.png" alt="Saint Gottard" class="h-12 object-contain brightness-0 invert opacity-90">
                <div class="border-l border-white/30 pl-4">
                    <h1 class="font-display text-2xl font-bold text-white leading-tight tracking-tight">Saint Gottard</h1>
                    <p class="text-xs text-green-200 font-medium tracking-widest uppercase">Siempre Natural &bull; Servicomercial</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-sm text-green-200 font-medium" id="fecha-lista"></span>
                <div class="w-px h-6 bg-white/20"></div>
                <span class="bg-blue-500/80 text-white text-xs font-bold px-3 py-1.5 rounded-full border border-blue-400/50 uppercase tracking-wider">
                    <i class="fa-solid fa-truck-fast mr-1"></i> Distribuidores
                </span>
            </div>
        </div>
    </header>

    <!-- Banner -->
    <div class="product-banner overflow-hidden">
        <div class="flex h-20 sm:h-28">
            <img src="https://www.saintgottard.com/media/catalog/product/cache/c6e4e63b766f363e7f2cb9bccdabccd6/7/7/7798008296930.jpg" alt="" class="flex-1 object-cover min-w-0">
            <img src="https://www.saintgottard.com/media/catalog/product/cache/c6e4e63b766f363e7f2cb9bccdabccd6/t/_/t_frio_frutos_rojos_1000x1000.jpg" alt="" class="flex-1 object-cover min-w-0">
            <img src="https://www.saintgottard.com/media/catalog/product/cache/c6e4e63b766f363e7f2cb9bccdabccd6/7/7/7798008291218_1_.jpg" alt="" class="flex-1 object-cover min-w-0">
            <img src="https://www.saintgottard.com/media/catalog/product/cache/c6e4e63b766f363e7f2cb9bccdabccd6/s/g/sg_caja_abierta_1000x1000_1.jpg" alt="" class="flex-1 object-cover min-w-0">
            <img src="https://www.saintgottard.com/media/catalog/product/cache/c6e4e63b766f363e7f2cb9bccdabccd6/7/7/7798008295100_1_.jpg" alt="" class="flex-1 object-cover min-w-0 hidden sm:block">
            <img src="https://www.saintgottard.com/media/catalog/product/cache/c6e4e63b766f363e7f2cb9bccdabccd6/a/d/adelgafruta_frutos_del_bosque_1_1.jpg" alt="" class="flex-1 object-cover min-w-0 hidden sm:block">
        </div>
    </div>

    <main class="max-w-5xl mx-auto px-4 py-8">
        <form id="order-form" class="space-y-6">

            <!-- SECCIÓN 1: Datos del Pedido -->
            <section class="bg-white rounded-2xl p-6 shadow-sm border border-stone-200/60">
                <div class="flex items-center gap-2.5 mb-5">
                    <div class="w-8 h-8 bg-brand-50 rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-file-invoice text-brand-600 text-sm"></i>
                    </div>
                    <h2 class="text-lg font-semibold text-gray-900">Datos del Pedido</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Fecha</label>
                        <input type="text" id="pedido-fecha" class="input-field bg-gray-50" readonly>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Vendedor</label>
                        <input type="text" id="pedido-vendedor" class="input-field" placeholder="Nombre del vendedor">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Facturación</label>
                        <select id="cliente-facturacion" class="input-field">
                            <option value="100% Facturado">100% Facturado</option>
                            <option value="50% Facturado">50% Facturado</option>
                            <option value="Sin Factura">Sin Factura</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- SECCIÓN 2: Datos del Cliente -->
            <section class="bg-white rounded-2xl p-6 shadow-sm border border-stone-200/60">
                <div class="flex items-center gap-2.5 mb-5">
                    <div class="w-8 h-8 bg-brand-50 rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-building text-brand-600 text-sm"></i>
                    </div>
                    <h2 class="text-lg font-semibold text-gray-900">Datos del Cliente</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Razón Social</label>
                        <input type="text" id="cliente-nombre" class="input-field" placeholder="Ej. Distribuidora XYZ S.A.">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Teléfono del Cliente</label>
                        <input type="text" id="cliente-telefono" class="input-field" placeholder="+54 11 0000-0000">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">CUIT</label>
                        <input type="text" id="cliente-cuit" class="input-field" placeholder="00-00000000-0">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Email</label>
                        <input type="email" id="cliente-email" class="input-field" placeholder="contacto@empresa.com">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Condición de Pago</label>
                        <select id="cliente-condicion-pago" class="input-field">
                            <option value="Contado">Contado</option>
                            <option value="15 días">15 días</option>
                            <option value="30 días">30 días</option>
                            <option value="45 días">45 días</option>
                            <option value="60 días">60 días</option>
                            <option value="90 días">90 días</option>
                            <option value="Cuenta Corriente">Cuenta Corriente</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Horario de Entrega</label>
                        <input type="text" id="cliente-horario" class="input-field" placeholder="Ej. 8 a 14:30 hs">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Dirección de Entrega del Pedido</label>
                        <input type="text" id="cliente-direccion" class="input-field" placeholder="Calle, Número, Localidad, Provincia">
                    </div>
                </div>
            </section>

            <!-- SECCIÓN 3: Datos del Transporte -->
            <section class="bg-white rounded-2xl p-6 shadow-sm border border-stone-200/60">
                <div class="flex items-center gap-2.5 mb-5">
                    <div class="w-8 h-8 bg-brand-50 rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-truck text-brand-600 text-sm"></i>
                    </div>
                    <h2 class="text-lg font-semibold text-gray-900">Datos del Transporte</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Nombre del Transporte</label>
                        <input type="text" id="transporte-nombre" class="input-field" placeholder="Ej. Transporte García">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Teléfono Transporte con Prefijo</label>
                        <input type="text" id="transporte-telefono" class="input-field" placeholder="+54 11 0000-0000">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Dirección del Transporte / Re-Despacho</label>
                        <input type="text" id="transporte-direccion" class="input-field" placeholder="Calle, Número, Localidad, Provincia">
                    </div>
                </div>
            </section>

            <!-- Buscador -->
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fa-solid fa-search text-gray-400"></i>
                </div>
                <input type="text" id="search-products" class="w-full pl-11 pr-4 py-3.5 bg-white border border-stone-200 rounded-xl text-sm focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none transition-all shadow-sm" placeholder="Buscar por nombre, código, EAN o categoría...">
            </div>

            <!-- Productos -->
            <div id="products-container">
                <div class="py-16 text-center text-gray-400">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-brand-50 rounded-full mb-4">
                        <i class="fa-solid fa-circle-notch fa-spin text-2xl text-brand-500"></i>
                    </div>
                    <p class="text-sm font-medium">Cargando lista de precios...</p>
                </div>
            </div>
        </form>
    </main>

    <!-- Footer flotante -->
    <div class="fixed bottom-0 left-0 w-full glass-footer border-t border-stone-200 p-4 z-50">
        <div class="max-w-5xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-6">
                <div>
                    <p class="text-[11px] text-gray-500 font-semibold uppercase tracking-wider">Packs</p>
                    <p class="text-xl font-bold text-gray-900" id="total-items">0</p>
                </div>
                <div class="h-8 w-px bg-stone-200"></div>
                <div>
                    <p class="text-[11px] text-gray-500 font-semibold uppercase tracking-wider">Total Estimado (sin IVA)</p>
                    <p class="text-xl font-bold text-brand-700" id="total-amount">$ 0,00</p>
                </div>
            </div>
            <button type="submit" form="order-form" id="btn-submit" class="w-full sm:w-auto bg-gradient-to-r from-brand-600 to-brand-700 hover:from-brand-700 hover:to-brand-800 text-white font-bold py-3 px-10 rounded-xl shadow-lg hover:shadow-xl transition-all flex items-center gap-2 justify-center group">
                <span>Enviar Pedido</span>
                <i class="fa-solid fa-paper-plane group-hover:translate-x-0.5 transition-transform"></i>
            </button>
        </div>
    </div>

    <!-- Notificación -->
    <div id="notification" class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-[100] hidden items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full mx-4 shadow-2xl transform scale-95 transition-transform duration-300">
            <div class="text-center">
                <div class="w-16 h-16 bg-brand-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-check text-3xl text-brand-600"></i>
                </div>
                <h3 class="text-xl font-bold text-gray-900 mb-2">¡Pedido Enviado!</h3>
                <p class="text-gray-500 mb-6 text-sm">El pedido ha sido procesado correctamente.</p>
                <button id="btn-close-notification" type="button" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-medium py-2.5 rounded-xl transition-colors">Hacer otro pedido</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
